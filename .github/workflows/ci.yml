name: CI Pipeline
# O pipeline dispara automaticamente fizer push ou abrir PR na branch main
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install flake8
        #Valida o código Python procurando erros
      - name: Rodar Flake8
        run: flake8 app.py --max-line-length=100

  build:
    name: Build Docker
    runs-on: ubuntu-latest
    #O job build só roda se o lint passar
    needs: lint
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Build da imagem
        run: docker build -t minha-app:latest .

  scan:
    name: Scan de Vulnerabilidades
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Build da imagem para scan
        run: docker build -t minha-app:latest .

      - name: Rodar Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: minha-app:latest
          format: table
          # O Trivy falha o pipeline se encontrar vulnerabilidades CRÍTICAS ou ALTAS na imagem Docker
          exit-code: "1"
          severity: CRITICAL,HIGH
